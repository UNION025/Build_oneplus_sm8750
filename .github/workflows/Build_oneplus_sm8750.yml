name: Build_oneplus_sm8750
on:
  workflow_dispatch:
    inputs:
      DEVICES_NAME:
        description: "📝 機型を選択："
        required: true
        type: choice
        options:
          - 'oneplus_13'
          - 'oneplus_ace5_pro'
          - 'oneplus_ace_6'
          - 'oneplus_13t'
          - 'oneplus_pad_2_pro'
          - 'oneplus_ace5_ultra'
          - 'realme_GT7'
          - 'realme_GT7pro'
          - 'realme_GT7pro_Speed'
          - 'realme_GT8'
        default: 'realme_GT7'

      keep_original_settings:
        description: "📝 純正のカーネル名と時間を保持する (推奨: true)"
        required: false
        default: true
        type: boolean
      
      ENABLE_HYMO:
        description: "📝 HymoFSを有効にする (推奨: true)"
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: Build_${{ github.event.inputs.DEVICES_NAME }}
    runs-on: ubuntu-latest
    env:
      DEVICES_NAME:           ${{ github.event.inputs.DEVICES_NAME }}
      KEEP_ORIGINAL_SETTINGS: ${{ github.event.inputs.keep_original_settings }}
      ENABLE_HYMO:            ${{ github.event.inputs.ENABLE_HYMO }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # 1. 環境変数の設定
      - name: ⚙️ Set REPO_MANIFEST
        run: |
          case "${{ env.DEVICES_NAME }}" in
            oneplus_ace5_pro|oneplus_ace_6|oneplus_13t|oneplus_pad_2_pro|oneplus_ace5_ultra|realme_GT7pro|realme_GT7pro_Speed|realme_GT8)
              echo "REPO_MANIFEST=git://git.codelinaro.org/clo/la/kernel/msm-5.15/manifest.git" >> $GITHUB_ENV
              echo "REPO_BRANCH=release" >> $GITHUB_ENV
              echo "MANIFEST_XML=https://raw.githubusercontent.com/1152661526/kernel_manifest/refs/heads/main/oneplus_ace5_pro/oneplus_ace5_pro_1212.xml" >> $GITHUB_ENV
              echo "DEVICE_CONFIG=gki_defconfig" >> $GITHUB_ENV
              ;;
            oneplus_13|realme_GT7)
              # 【修正】URLを kernelplatform/manifest.git に変更 (ここがエラーの原因でした)
              echo "REPO_MANIFEST=https://git.codelinaro.org/clo/la/kernelplatform/manifest.git" >> $GITHUB_ENV
              echo "REPO_BRANCH=release" >> $GITHUB_ENV
              echo "MANIFEST_XML=https://raw.githubusercontent.com/1152661526/kernel_manifest/refs/heads/main/oneplus_13/oneplus_13_136.xml" >> $GITHUB_ENV
              echo "DEVICE_CONFIG=gki_defconfig" >> $GITHUB_ENV
              ;;
            *)
              echo "Unsupported device: ${{ env.DEVICES_NAME }}"
              exit 1
              ;;
          esac

      # 2. ビルドツールの準備
      - name: 🛠️ Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y repo git curl wget python3 python3-pip
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 3. カーネルソースの取得
      - name: 📥 Clone Kernel Source
        run: |
          mkdir kernel_workspace
          cd kernel_workspace
          # 初期化 (bootstrap)
          repo init -u ${{ env.REPO_MANIFEST }} -b ${{ env.REPO_BRANCH }}
          # マニフェストの上書き
          curl -o .repo/manifests/default.xml ${{ env.MANIFEST_XML }}
          # 同期
          repo sync -c -j$(nproc --all) --no-clone-bundle --no-tags
          
      # 4. KSU / SUSFS / HymoFS のパッチ適用
      - name: 🧩 KernelSU & SUSFS & HymoFS Patch
        run: |
          cd kernel_workspace
          
          # 【修正】SukiSUの設定を builtin (汎用/安定) に変更
          echo "Configuring SukiSU Ultra (builtin mode)..."
          curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | bash -s builtin
          
          cd ./KernelSU
          GIT_COMMIT_HASH=$(git rev-parse --short=8 HEAD)
          echo "KSU_GIT_VERSION=$GIT_COMMIT_HASH" >> $GITHUB_ENV
          
          # 【修正】バージョン取得も builtin 側から行う
          echo "Fetching KSU Version..."
          for i in {1..3}; do
            KSU_API_VERSION=$(curl -s "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/builtin/kernel/Kbuild" | grep -m1 "KSU_VERSION_API :=" | cut -d "=" -f 2 | tr -d ' ')
            if [ -n "$KSU_API_VERSION" ]; then break; fi
            sleep 2
          done
          echo "KSU_VER=$KSU_API_VERSION" >> $GITHUB_ENV
          
          cd ..
          
          # SUSFSパッチ
          echo "Applying SUSFS..."
          cp ./fs/susfs.c ./common/fs/susfs.c
          cp ./include/linux/susfs.h ./common/include/linux/susfs.h
          # ※パッチファイル名はリポジトリ内のものを使用
          patch -p1 < 50_add_susfs_in_gki-android15-6.6.patch || true
          
          # 【修正】HymoFSパッチを Android15_6.6 ブランチに変更 (WiFi死対策)
          if [ "${{ env.ENABLE_HYMO }}" = "true" ]; then
            echo "Adding HymoFS Patch (Android 15 / Kernel 6.6 Branch)..."
            # 以前の main ブランチではなく、適合するブランチを指定
            wget https://raw.githubusercontent.com/Anatdx/HymoFS/refs/heads/android15_6.6/patch/hymofs_with_susfs.patch
            patch -p1 -F 3 < hymofs_with_susfs.patch || echo "HymoFS Patch applied with offsets or failed."
            
            # コンフィグ追加
            echo "CONFIG_HYMOFS=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}
          fi
          
          # configの登録
          echo "CONFIG_KSU_SUSFS=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}
          echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}
          echo "CONFIG_KSU_SUSFS_SUS_SU=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}

          # その他の修正パッチ (元のファイルにあったもの)
          cp "${GITHUB_WORKSPACE}/.github/workflows/Bin/hmbird_patch.patch" ./hmbird_patch.patch || true
          if [ -f "hmbird_patch.patch" ]; then
             patch -p1 -F 3 < hmbird_patch.patch || echo "HMBIRD Patch already applied or failed."
          fi

      # 5. ビルド実行
      - name: 🔨 Build Kernel
        run: |
          # 時間設定
          if [ "${{ env.KEEP_ORIGINAL_SETTINGS }}" = "true" ]; then
            # 純正の時間などを使用する場合のロジック（必要ならここに記述）
            export KERNEL_TIME=$(date "+%Y-%m-%d %H:%M:%S")
          else
            export KERNEL_TIME=$(date "+%Y%m%d_%H%M")
          fi
          echo "KERNEL_TIME=$KERNEL_TIME" >> $GITHUB_ENV
          
          WORKDIR="$(pwd)"
          
          # コンパイラのパス設定 (元のファイルに合わせています)
          export PATH="$WORKDIR/kernel_workspace/clang18/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          
          # キャッシュ設定
          export CCACHE_DIR="$HOME/.ccache_${{ env.DEVICES_NAME }}"
          export CCACHE_EXEC=$(which ccache)
          export USE_CCACHE=1
          
          cd kernel_workspace
          
          # ディレクトリ構造によっては common に移動
          if [ -d "common" ]; then cd common; fi
          
          echo "Starting Build..."
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error ${{ env.DEVICE_CONFIG }}
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error Image

      # 6. AnyKernel3 でパッケージ化
      - name: 📦 Make AnyKernel3
        run: |
          # 元のファイルにあったBin内のAK3を使用
          cp "${GITHUB_WORKSPACE}/.github/workflows/Bin/AnyKernel3.zip" ./AnyKernel3.zip
          unzip AnyKernel3.zip -d AnyKernel3
          
          # ビルドされたImageを探す
          if [ -f "kernel_workspace/common/out/arch/arm64/boot/Image" ]; then
             cp "kernel_workspace/common/out/arch/arm64/boot/Image" AnyKernel3/
          elif [ -f "kernel_workspace/out/arch/arm64/boot/Image" ]; then
             cp "kernel_workspace/out/arch/arm64/boot/Image" AnyKernel3/
          else
             # GKI構成の場合のパス
             find kernel_workspace -name Image | head -n 1 | xargs -I {} cp {} AnyKernel3/
          fi
          
          cd AnyKernel3
          
          # 【修正】ZIP名を指定の名前に変更
          FINAL_ZIP="AK3_SukiSU-Ultra_${{ env.DEVICES_NAME }}.zip"
          
          zip -r "$FINAL_ZIP" *
          
          # アップロード用に移動
          mv "$FINAL_ZIP" ../
          echo "FINAL_ZIP=$FINAL_ZIP" >> $GITHUB_ENV

      # 7. アップロード
      - name: 📤 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AK3_SukiSU-Ultra_${{ env.DEVICES_NAME }}
          path: ${{ env.FINAL_ZIP }}
