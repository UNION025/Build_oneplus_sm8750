name: Build_oneplus_MT6991
on:
  workflow_dispatch:
    inputs:
      # 機種選択はMTK兄弟機のみに限定
      DEVICES_NAME:
        description: "📝 対象機種"
        required: true
        type: choice
        options:
          - 'realme_GT7'
          - 'oneplus_ace5_ultra'
        default: 'realme_GT7'

      keep_original_settings:
        description: "📝 純正のカーネル名と時間を保持する"
        required: false
        default: true
        type: boolean
      
      ENABLE_HYMO:
        description: "📝 HymoFS"
        required: false
        default: true
        type: boolean
        
      ENABLE_SCX:
        description: "📝 完美風馳 (Sched Patch for MT6991)"
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: Build_${{ github.event.inputs.DEVICES_NAME }}
    runs-on: ubuntu-latest
    env:
      DEVICES_NAME: ${{ github.event.inputs.DEVICES_NAME }}
      KEEP_ORIGINAL_SETTINGS: ${{ github.event.inputs.keep_original_settings }}
      ENABLE_HYMO: ${{ github.event.inputs.ENABLE_HYMO }}
      ENABLE_SCX: ${{ github.event.inputs.ENABLE_SCX }}
      # MT6991用の固定設定 [cite: 11, 12, 68, 69]
      REPO_MANIFEST: "mt6991_v_15.0.2_ace5_ultra"
      SCHED_FILE: "oneplus_ace5_ultra"
      DEVICE_CONFIG: "gki_defconfig"
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. 環境構築 & ソース取得 (高速ZIPダウンロード方式)
      - name: 📥 Setup & Download Source
        run: |
          rm -rf kernel_workspace
          mkdir kernel_workspace
          cd kernel_workspace
          
          # 依存関係
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev dos2unix ccache p7zip-full aria2
          
          echo "📥 Downloading Kernel Source (MT6991)..."
          # Repoを使わず、OnePlusOSSから直接ZIPを落とす [cite: 22, 89]
          ZIP_URL="https://github.com/OnePlusOSS/android_kernel_oneplus_mt6991/archive/refs/heads/oneplus/${REPO_MANIFEST}.zip"
          
          aria2c -s16 -x16 -k1M "$ZIP_URL" -o common.zip
          unzip -q common.zip
          mv android_kernel_oneplus_mt6991-oneplus-${REPO_MANIFEST} common
          rm -rf common.zip
          
          echo "📥 Downloading Toolchain..."
          mkdir -p clang18
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/clang-r510928.zip -o clang.zip
          unzip -q clang.zip -d clang18
          rm clang.zip
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/build-tools.zip -o build-tools.zip
          unzip -q build-tools.zip
          rm build-tools.zip
          
          # クリーンアップ [cite: 25, 92]
          rm common/android/abi_gki_protected_exports_* || true
          sed -i 's/ -dirty//g' common/scripts/setlocalversion

      # 2. ccache設定
      - name: 🔧 Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache_${{ env.DEVICES_NAME }}
          key: ccache-${{ env.DEVICES_NAME }}-${{ runner.os }}
          restore-keys: ccache-${{ env.DEVICES_NAME }}-

      - name: 🔧 Init ccache
        run: |
          export CCACHE_DIR="$HOME/.ccache_${{ env.DEVICES_NAME }}"
          mkdir -p "$CCACHE_DIR"
          ccache -M 3G

      # 3. 圧縮パッチ (LZ4/ZSTD)
      - name: 🔧 Apply Compression Patches
        run: |
          cd kernel_workspace
          git clone https://github.com/cctv18/oppo_oplus_realme_sm8750.git
          cp ./oppo_oplus_realme_sm8750/zram_patch/001-lz4.patch ./common
          cp ./oppo_oplus_realme_sm8750/zram_patch/lz4armv8.S ./common/lib
          cp ./oppo_oplus_realme_sm8750/zram_patch/002-zstd.patch ./common/
          cd common
          git apply -p1 < 001-lz4.patch || true
          patch -p1 < 002-zstd.patch || true

      # 4. KernelSU / SUSFS / HymoFS (修正版)
      - name: 🧩 Apply KernelSU & SUSFS & HymoFS
        run: |
          cd kernel_workspace
          
          # A. SukiSU (MediaTek安定版: builtin) [cite: 30, 108, 200]
          echo "Configuring SukiSU Ultra (builtin)..."
          curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | bash -s builtin
          
          # B. SUSFS (Android 15 GKI) [cite: 35, 117, 209]
          echo "Applying SUSFS..."
          git clone https://github.com/ShirkNeko/susfs4ksu.git -b gki-android15-6.6
          git clone https://github.com/ShirkNeko/SukiSU_patch.git
          
          cp ./susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch ./common/
          cp ./susfs4ksu/kernel_patches/fs/* ./common/fs/
          cp ./susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
          cp ./SukiSU_patch/69_hide_stuff.patch ./common/
          
          cd common
          patch -p1 < 50_add_susfs_in_gki-android15-6.6.patch || echo "SUSFS Patch Failed!"
          patch -p1 < 69_hide_stuff.patch || true
          
          # C. HymoFS (Android 15対応ブランチを使用)
          if [ "${{ env.ENABLE_HYMO }}" = "true" ]; then
            echo "Adding HymoFS Patch (Android 15 Fix)..."
            wget https://raw.githubusercontent.com/Anatdx/HymoFS/refs/heads/android15_6.6/patch/hymofs_with_susfs.patch
            patch -p1 -F 3 < hymofs_with_susfs.patch || echo "HymoFS Patch Failed!"
            
            echo "CONFIG_HYMOFS=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}
          fi
          
          # SUSFS Configs
          echo "CONFIG_KSU_SUSFS=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}
          echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}
          echo "CONFIG_KSU_SUSFS_SUS_SU=y" >> ./arch/arm64/configs/${{ env.DEVICE_CONFIG }}

      # 5. Sched Patch (完美風馳) 
      - name: 🔧 Apply Sched Patch
        if: ${{ env.ENABLE_SCX == 'true' }}
        run: |
          cd kernel_workspace/common
          # MT6991専用ブランチを指定 
          git clone https://github.com/Numbersf/SCHED_PATCH.git -b "mt6991"
          
          cp ./SCHED_PATCH/fengchi_${{ env.SCHED_FILE }}.patch ./
          if [[ -f "fengchi_${{ env.SCHED_FILE }}.patch" ]]; then
             dos2unix "fengchi_${{ env.SCHED_FILE }}.patch"
             patch -p1 -F 3 < "fengchi_${{ env.SCHED_FILE }}.patch" || echo "Sched Patch Failed"
          fi

      # 6. ビルド実行
      - name: 🔨 Build Kernel
        run: |
          WORKDIR="$(pwd)"
          export PATH="$WORKDIR/kernel_workspace/clang18/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          export CCACHE_DIR="$HOME/.ccache_${{ env.DEVICES_NAME }}"
          export CCACHE_EXEC=$(which ccache)
          export USE_CCACHE=1
          
          if [ "${{ env.KEEP_ORIGINAL_SETTINGS }}" = "true" ]; then
             export KERNEL_TIME=$(date "+%Y-%m-%d %H:%M:%S")
          else
             export KERNEL_TIME=$(date "+%Y%m%d_%H%M")
          fi
          
          cd kernel_workspace/common
          
          echo "Starting Build..."
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error ${{ env.DEVICE_CONFIG }}
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error Image

      # 7. パッケージ化
      - name: 📦 Make AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          
          if [ -f "kernel_workspace/common/out/arch/arm64/boot/Image" ]; then
             cp "kernel_workspace/common/out/arch/arm64/boot/Image" AnyKernel3/
          else
             find kernel_workspace -name Image | head -n 1 | xargs -I {} cp {} AnyKernel3/
          fi
          
          cd AnyKernel3
          FINAL_ZIP="AK3_SukiSU-Ultra_${{ env.DEVICES_NAME }}_MT6991.zip"
          zip -r "$FINAL_ZIP" *
          mv "$FINAL_ZIP" ../
          echo "FINAL_ZIP=$FINAL_ZIP" >> $GITHUB_ENV

      - name: 📤 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AK3_SukiSU-Ultra_${{ env.DEVICES_NAME }}
          path: ${{ env.FINAL_ZIP }}
