name: Build_oneplus_sm8750
on:
  workflow_dispatch:
    inputs:
      DEVICES_NAME:
        description: "📝 機型を選択："
        required: true
        type: choice
        options:
          - 'oneplus_13'
          - 'oneplus_ace5_pro'
          - 'oneplus_ace_6'
          - 'oneplus_13t'
          - 'oneplus_pad_2_pro'
          - 'oneplus_ace5_ultra'
          - 'realme_GT7'
          - 'realme_GT7pro'
          - 'realme_GT7pro_Speed'
          - 'realme_GT8'
        default: 'oneplus_ace5_pro'

      keep_original_settings:
        description: "📝 純正のカーネル名と時間を保持する (推奨: true)"
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: Build_${{ github.event.inputs.DEVICES_NAME }}
    runs-on: ubuntu-latest
    env:
      DEVICES_NAME:           ${{ github.event.inputs.DEVICES_NAME }}
      KEEP_ORIGINAL_SETTINGS: ${{ github.event.inputs.keep_original_settings }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # 1. 環境変数の設定
      - name: ⚙️ Set REPO_MANIFEST
        run: |
          case "${{ env.DEVICES_NAME }}" in
            oneplus_ace5_pro)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_oneplus_ace5_pro" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace5_pro_b" >> $GITHUB_ENV
              ;;
            oneplus_13)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_oneplus_13" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_13_b" >> $GITHUB_ENV
              ;;
            oneplus_ace_6)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_ace_6" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace_6" >> $GITHUB_ENV
              ;;
            oneplus_13t)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_oneplus_13t" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_13t_b" >> $GITHUB_ENV
              ;;
            oneplus_pad_2_pro)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_pad_2_pro" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_pad_2_pro_b" >> $GITHUB_ENV
              ;;
            oneplus_ace5_ultra)
              echo "REPO_MANIFEST=mt6991_v_15.0.2_ace5_ultra" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace5_ultra" >> $GITHUB_ENV
              ;;
            realme_GT7)
              echo "REPO_MANIFEST=mt6991_v_15.0.2_ace5_ultra" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace5_ultra" >> $GITHUB_ENV
              ;;
            realme_GT7pro|realme_GT7pro_Speed|realme_GT8)
              echo "SCHED_FILE=none" >> $GITHUB_ENV
              ;;
            *)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_oneplus_13" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_13_b" >> $GITHUB_ENV
              ;;
          esac
          
          if [ "${{ env.KEEP_ORIGINAL_SETTINGS }}" = "true" ]; then
            case "${{ env.DEVICES_NAME }}" in
            oneplus_pad_2_pro)
              echo 'DEFAULT_SUFFIX=-android15-8-g5a0ffb447c1d-ab13771415-4k' >> $GITHUB_ENV
              echo 'KERNEL_TIME=Fri Jul 11 22:46:09 UTC 2025' >> $GITHUB_ENV
              ;;
            oneplus_13)
              echo 'DEFAULT_SUFFIX=-android15-8-gf4dc45704e54-abogki446052083-4k' >> $GITHUB_ENV
              echo 'KERNEL_TIME=Fri Sep 19 06:13:40 UTC 2025' >> $GITHUB_ENV
              ;;
            realme_GT7)
              echo 'DEFAULT_SUFFIX=-android15-8-gd43086512890-abogki423825152-4k' >> $GITHUB_ENV
              echo 'KERNEL_TIME=Tue Jun 10 12:12:23 UTC 2025' >> $GITHUB_ENV
              ;;
            *)
              echo 'DEFAULT_SUFFIX=-android15-8-g29d86c5fc9dd-abogki428889875-4k' >> $GITHUB_ENV
              echo 'KERNEL_TIME=Tue Jul  1 19:48:18 UTC 2025' >> $GITHUB_ENV
              ;;
          esac
          else
            echo "DEFAULT_SUFFIX=-SuKiSU" >> $GITHUB_ENV
            echo "KERNEL_TIME=$(date)" >> $GITHUB_ENV
          fi

      # 2. 依存関係とソース取得
      - name: 🛠 Install dependencies and Initialize repo
        run: |
          rm -rf kernel_workspace
          mkdir kernel_workspace
          cd kernel_workspace
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev dos2unix ccache p7zip-full
          
          echo "Cloning Source..."
          if [ "${DEVICES_NAME}" = "oneplus_ace5_ultra" ] || [ "${DEVICES_NAME}" = "realme_GT7" ]; then
            aria2c -s16 -x16 -k1M https://github.com/OnePlusOSS/android_kernel_oneplus_mt6991/archive/refs/heads/oneplus/${REPO_MANIFEST}.zip -o common.zip
            unzip -q common.zip && mv "android_kernel_oneplus_mt6991-oneplus-${REPO_MANIFEST}" common
          elif [[ "${DEVICES_NAME}" == *"realme"* ]]; then
             aria2c -s16 -x16 -k1M https://github.com/realme-kernel-opensource/realme_GT7pro-AndroidB-common-source/archive/refs/heads/master.zip -o common.zip
             unzip -q common.zip && mv "realme_GT7pro-AndroidB-common-source-master" common
          else
            aria2c -s16 -x16 -k1M https://github.com/OnePlusOSS/android_kernel_common_oneplus_sm8750/archive/refs/heads/oneplus/${REPO_MANIFEST}.zip -o common.zip
            unzip -q common.zip && mv "android_kernel_common_oneplus_sm8750-oneplus-${REPO_MANIFEST}" common
          fi
          rm -rf common.zip 
          
          echo "Cloning Tools..."
          mkdir -p clang18
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/clang-r510928.zip -o clang.zip
          unzip -q clang.zip -d clang18
          rm -rf clang.zip
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/build-tools.zip -o build-tools.zip
          unzip -q build-tools.zip
          rm -rf build-tools.zip
          
          rm common/android/abi_gki_protected_exports_* || true
          for f in common/scripts/setlocalversion; do sed -i 's/ -dirty//g' "$f"; done

      # 3. ccache設定
      - name: 📥 Setup ccache
        uses: actions/cache@v4
        id: ccache-restore
        with:
          path: ~/.ccache_${{ env.DEVICES_NAME }}
          key: ccache-${{ env.DEVICES_NAME }}-${{ runner.os }}
          restore-keys: ccache-${{ env.DEVICES_NAME }}-

      - name: 🔧 Init ccache
        run: |
          export CCACHE_DIR="$HOME/.ccache_${{ env.DEVICES_NAME }}"
          mkdir -p "$CCACHE_DIR"
          ccache -M 3G

      # 4. SuKiSU 導入 & バージョン表記カスタム (Hymoなし、バージョン偽装あり)
      - name: ⚙️ Set SuKiSU & Custom Version
        run: |
          cd kernel_workspace
          # SuKiSUのセットアップ
          curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | bash -s builtin
          
          # バージョン定義の修正 (114514 & @unidonbri)
          cd KernelSU
          GIT_COMMIT_HASH=$(git rev-parse --short=8 HEAD)
          echo "Current Commit: $GIT_COMMIT_HASH"
          
          CUSTOM_VERSION="v3.1.8-${GIT_COMMIT_HASH}-@unidonbri"
          
          # KernelSU/kernel/Kbuild にバージョン情報を追記
          if [ -f "kernel/Kbuild" ]; then
             echo "Appending custom version to KernelSU/kernel/Kbuild..."
             sed -i '/KSU_VERSION_API/d' kernel/Kbuild
             sed -i '/KSU_VERSION_FULL/d' kernel/Kbuild
             
             echo "ccflags-y += -DKSU_VERSION_API=114514" >> kernel/Kbuild
             echo "ccflags-y += -DKSU_VERSION_FULL=\\\"$CUSTOM_VERSION\\\"" >> kernel/Kbuild
             
             echo "Success: Version patched to $CUSTOM_VERSION (API: 114514)"
             tail -n 5 kernel/Kbuild
          else
             echo "Error: KernelSU/kernel/Kbuild not found!"
             exit 1
          fi

      # 5. SUSFS導入 (Hymoは削除)
      - name: 🔧 Set up SUSFS
        run: |
          cd kernel_workspace
          echo "Adding SUSFS patches..."
          git clone https://github.com/ShirkNeko/susfs4ksu.git -b gki-android15-6.6
          git clone https://github.com/ShirkNeko/SukiSU_patch.git
          
          cp ./susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch ./common/
          cp ./susfs4ksu/kernel_patches/fs/* ./common/fs/
          cp ./susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
          cp ./SukiSU_patch/69_hide_stuff.patch ./common/
          
          cd ./common
          patch -p1 < 50_add_susfs_in_gki-android15-6.6.patch || echo "SUSFS patch failed"
          patch -p1 < 69_hide_stuff.patch || echo "Hide stuff patch skipped"
          
          # Hymoのインストール処理はここで完全に削除しました

      # 6. Sched Patch (ゲームパフォーマンス - 完美風馳)
      - name: 🔧 Apply Sched Patch (Fengchi)
        run: |
          if [ "${{ env.SCHED_FILE }}" = "none" ]; then
             echo "Skipping Sched Patch for this device."
          else
             cd kernel_workspace/common
             if [ "${DEVICES_NAME}" = "oneplus_ace5_ultra" ] || [ "${DEVICES_NAME}" = "realme_GT7" ]; then
                git clone https://github.com/Numbersf/SCHED_PATCH.git -b "mt6991"
             else
                git clone https://github.com/Numbersf/SCHED_PATCH.git -b "sm8750"
             fi
             
             echo "Applying Sched Patch: fengchi_${{ env.SCHED_FILE }}.patch"
             cp ./SCHED_PATCH/fengchi_${{ env.SCHED_FILE }}.patch ./
             if [[ -f "fengchi_${{ env.SCHED_FILE }}.patch" ]]; then
                dos2unix "fengchi_${{ env.SCHED_FILE }}.patch"
                patch -p1 -F 3 < "fengchi_${{ env.SCHED_FILE }}.patch" || echo "Sched patch application failed"
             else
                echo "Patch file not found!"
             fi
          fi

      # 7. defconfigの設定
      - name: 🔧 Configure defconfig
        run: |
          cd kernel_workspace
          DEFCONFIG="./common/arch/arm64/configs/gki_defconfig"
          
          # KernelSU
          echo "CONFIG_KSU=y" >> $DEFCONFIG
          
          # SUSFS (Root隠蔽)
          echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> $DEFCONFIG
          
          # HymoFS の設定も削除しました
          
          # ゲームパフォーマンス
          echo "CONFIG_TCP_CONG_ADVANCED=y" >> $DEFCONFIG
          echo "CONFIG_NET_SCH_FQ_CODEL=y" >> $DEFCONFIG
          echo "CONFIG_NET_SCH_FQ=y" >> $DEFCONFIG
          
          # カーネル名の偽装
          ESCAPED_SUFFIX=$(printf '%s\n' "$DEFAULT_SUFFIX" | sed 's:[\/&]:\\&:g')
          sudo sed -i "s/-4k/$ESCAPED_SUFFIX/g" $DEFCONFIG
          sudo sed -i 's/check_defconfig//' ./common/build.config.gki

      # 8. HMBIRDパッチ
      - name: 🔧 Apply HMBIRD Patch
        run: |
          cd kernel_workspace/common
          sed -i '1iobj-y += hmbird_patch.o' drivers/Makefile
          cp "${GITHUB_WORKSPACE}/.github/workflows/Bin/hmbird_patch.patch" ./hmbird_patch.patch
          patch -p1 -F 3 < hmbird_patch.patch || echo "HMBIRD Patch already applied."

      # 9. ビルド
      - name: 🔨 Build Kernel
        run: |
          WORKDIR="$(pwd)"
          export PATH="/usr/lib/ccache:$PATH"
          export PATH="$WORKDIR/kernel_workspace/clang18/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          export CCACHE_DIR="$HOME/.ccache_${{ env.DEVICES_NAME }}"
          export CCACHE_EXEC=$(which ccache)
          export USE_CCACHE=1
          export KBUILD_BUILD_TIMESTAMP="${KERNEL_TIME}"
          
          cd kernel_workspace/common
          
          echo "Starting Build..."
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error gki_defconfig
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error Image

      - name: 📦 Make AnyKernel3
        run: |
          cp "${GITHUB_WORKSPACE}/.github/workflows/Bin/main.bin" ./
          chmod +x main.bin
          ./main.bin "make_anykernel3"
          rm -rf ./main.bin

      - name: 📤 Upload Result
        uses: actions/upload-artifact@v4
        with:
         name: Kernel_NoHymo_${{ env.DEVICES_NAME }}
         path: ./AnyKernel3/*
