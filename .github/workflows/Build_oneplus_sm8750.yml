name: Build_oneplus_sm8750
on:
  workflow_dispatch:
    inputs:
      DEVICES_NAME:
        description: "📝 機型を選択："
        required: true
        type: choice
        options:
          - 'oneplus_13'
          - 'oneplus_ace5_pro'
          - 'oneplus_ace_6'
          - 'oneplus_13t'
          - 'oneplus_pad_2_pro'
          - 'oneplus_ace5_ultra'
          - 'realme_GT7'
          - 'realme_GT7pro'
          - 'realme_GT7pro_Speed'
          - 'realme_GT8'
        default: 'realme_GT7'

      keep_original_settings:
        description: "📝 純正のカーネル名と時間を保持する (推奨: true)"
        required: false
        default: true
        type: boolean
        
      ENABLE_HYMO:
        description: "📝 HymoFSを有効にする (推奨: true)"
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: Build_${{ github.event.inputs.DEVICES_NAME }}
    runs-on: ubuntu-latest
    env:
      DEVICES_NAME:           ${{ github.event.inputs.DEVICES_NAME }}
      KEEP_ORIGINAL_SETTINGS: ${{ github.event.inputs.keep_original_settings }}
      ENABLE_HYMO:            ${{ github.event.inputs.ENABLE_HYMO }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # 1. 環境変数の設定
      - name: ⚙️ Set REPO_MANIFEST
        run: |
          case "${{ env.DEVICES_NAME }}" in
            oneplus_ace5_pro|oneplus_ace_6|oneplus_13t|oneplus_pad_2_pro|oneplus_ace5_ultra|realme_GT7pro|realme_GT7pro_Speed|realme_GT8)
              echo "REPO_MANIFEST=git://git.codelinaro.org/clo/la/kernel/msm-5.15/manifest.git" >> $GITHUB_ENV
              echo "REPO_BRANCH=release" >> $GITHUB_ENV
              echo "MANIFEST_XML=https://raw.githubusercontent.com/1152661526/kernel_manifest/refs/heads/main/oneplus_ace5_pro/oneplus_ace5_pro_1212.xml" >> $GITHUB_ENV
              echo "DEVICE_CONFIG=gki_defconfig" >> $GITHUB_ENV
              ;;
            oneplus_13|realme_GT7)
              echo "REPO_MANIFEST=https://git.codelinaro.org/clo/la/kernel/manifest.git" >> $GITHUB_ENV
              echo "REPO_BRANCH=release" >> $GITHUB_ENV
              echo "MANIFEST_XML=https://raw.githubusercontent.com/1152661526/kernel_manifest/refs/heads/main/oneplus_13/oneplus_13_136.xml" >> $GITHUB_ENV
              echo "DEVICE_CONFIG=gki_defconfig" >> $GITHUB_ENV
              ;;
            *)
              echo "Unsupported device: ${{ env.DEVICES_NAME }}"
              exit 1
              ;;
          esac

      # 2. ビルドツールの準備
      - name: 🛠️ Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y repo git curl wget python3 python3-pip
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 3. カーネルソースの取得
      - name: 📥 Clone Kernel Source
        run: |
          mkdir kernel_workspace
          cd kernel_workspace
          repo init -u ${{ env.REPO_MANIFEST }} -b ${{ env.REPO_BRANCH }}
          # マニフェストファイルをローカルXMLで上書き
          curl -o .repo/manifests/default.xml ${{ env.MANIFEST_XML }}
          repo sync -c -j$(nproc --all) --no-clone-bundle --no-tags
          
      # 4. KSU / SUSFS / HymoFS のパッチ適用（ここが最重要修正箇所！）
      - name: 🧩 KernelSU & SUSFS & HymoFS Patch
        run: |
          cd kernel_workspace
          
          # 【修正1】SukiSUの設定を builtin (汎用/安定) に変更
          echo "Configuring SukiSU Ultra (builtin mode)..."
          curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | bash -s builtin
          
          cd ./KernelSU
          GIT_COMMIT_HASH=$(git rev-parse --short=8 HEAD)
          echo "KSU_GIT_VERSION=$GIT_COMMIT_HASH" >> $GITHUB_ENV
          
          # 【修正2】バージョン取得も builtin 側から行う
          echo "Fetching KSU Version..."
          for i in {1..3}; do
            KSU_API_VERSION=$(curl -s "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/builtin/kernel/Kbuild" | grep -m1 "KSU_VERSION_API :=" | cut -d "=" -f 2 | tr -d ' ')
            if [ -n "$KSU_API_VERSION" ]; then break; fi
            sleep 2
          done
          echo "KSU_VER=$KSU_API_VERSION" >> $GITHUB_ENV
          
          cd ..
          
          # SUSFSパッチ（変更なし）
          echo "Applying SUSFS..."
          cp ./fs/susfs.c ./common/fs/susfs.c
          cp ./include/linux/susfs.h ./common/include/linux/susfs.h
          # ※ファイル名がリポジトリ内のものと一致しているか確認してください
          patch -p1 < 50_add_susfs_in_gki-android15-6.6.patch || true
          
          # 【修正3】HymoFSパッチを Android15_6.6 ブランチに変更（WiFi死対策の決定打）
          if [ "${{ env.ENABLE_HYMO }}" = "true" ]; then
            echo "Adding HymoFS Patch (Android 15 / Kernel 6.6 Branch)..."
            # 以前の main ブランチではなく、適合するブランチを指定
            wget https://raw.githubusercontent.com/Anatdx/HymoFS/refs/heads/android15_6.6/patch/hymofs_with_susfs.patch
            patch -p1 -F 3 < hymofs_with_susfs.patch || echo "HymoFS Patch applied with offsets or failed."
            
            # コンフィグ追加
            echo "CONFIG_HYMOFS=y" >> ./arch/arm64/configs/gki_defconfig
          fi
          
          # configの登録
          echo "CONFIG_KSU_SUSFS=y" >> ./arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> ./arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> ./arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> ./arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y" >> ./arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> ./arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> ./arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> ./arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> ./arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_SU=y" >> ./arch/arm64/configs/gki_defconfig

      # 5. ビルド実行
      - name: 🔨 Build Kernel
        run: |
          cd kernel_workspace
          
          # 環境変数の設定
          WORKDIR="$(pwd)"
          export PATH="$WORKDIR/prebuilts/clang/host/linux-x86/clang-r510928/bin:$PATH"
          export PATH="$WORKDIR/prebuilts/build-tools/linux-x86/bin:$PATH"
          
          # GKIカーネルのビルド
          echo "Starting Build..."
          ./tools/bazel run --config=fast //common:kernel_aarch64_dist -- --build_config=common/build.config.gki.aarch64
          
      # 6. AnyKernel3 でパッケージ化（ZIP名変更込み）
      - name: 📦 Make AnyKernel3
        run: |
          # 成果物の場所（Bazelビルドの場合の一般的なパス）
          IMAGE_PATH="kernel_workspace/out/kernel_aarch64/dist/Image"
          
          if [ ! -f "$IMAGE_PATH" ]; then
             echo "Image not found at $IMAGE_PATH. Trying fallback..."
             IMAGE_PATH=$(find kernel_workspace/out -name Image | head -n 1)
          fi
          
          if [ -f "$IMAGE_PATH" ]; then
            git clone https://github.com/osm0sis/AnyKernel3.git
            cp "$IMAGE_PATH" AnyKernel3/
            cd AnyKernel3
            
            # 【修正4】ZIPファイル名を指定の形式に変更
            ZIP_NAME="AK3_SukiSU-Ultra_${{ env.DEVICES_NAME }}.zip"
            
            zip -r "$ZIP_NAME" *
            
            # GitHub Actionsのアップロード用に場所を移動
            mv "$ZIP_NAME" ../
            echo "FINAL_ZIP=$ZIP_NAME" >> $GITHUB_ENV
          else
            echo "Kernel Image compilation failed!"
            exit 1
          fi

      # 7. アップロード
      - name: 📤 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AK3_SukiSU-Ultra_${{ env.DEVICES_NAME }}
          path: ${{ env.FINAL_ZIP }}
